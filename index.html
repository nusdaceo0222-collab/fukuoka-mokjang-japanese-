<style>
*{box-sizing:border-box}
body{
  margin:0;
  font-family:-apple-system,BlinkMacSystemFont,"Noto Sans KR",Arial,sans-serif;

  color:#111827;
}
header{
  position:sticky;
  top:0;
  z-index:10;
  background:linear-gradient(135deg,#1d4ed8,#38bdf8);
  color:white;
  padding:15px;
  text-align:center;
  box-shadow:0 2px 10px #0003;
}
header h1{margin:0;font-size:21px}
header p{margin:5px 0 0;font-size:13px}
main{max-width:900px;margin:auto;padding:12px}
.card{

  padding:14px;
  margin-bottom:12px;

}
h2{font-size:19px;margin:4px 0 12px}
.dayTabs{

  gap:7px;
}
.dayTabs button{
  border:0;
  border-radius:13px;
  padding:12px 6px;
  font-size:14px;
  font-weight:800;
  background:#dbeafe;
  color:#1e3a8a;
}
.dayTabs button.active{
  background:#2563eb;
  color:white;
}
.scheduleBtn{
  width:100%;
  text-align:left;
  border:1px solid #dbeafe;
  background:#fff;
  border-radius:14px;
  padding:12px;
  margin:6px 0;
  font-size:16px;
  font-weight:800;
}
.scheduleBtn small{
  display:block;
  color:#64748b;
  margin-top:4px;
  font-size:13px;
  font-weight:500;
}
.result{
  background:#f8fafc;

  padding:10px;

}
.label{font-size:12px;color:#64748b}
.ko{font-size:20px;font-weight:900;line-height:1.45}
.jp{font-size:21px;font-weight:900;line-height:1.45}
.pron{font-size:16px;color:#475569;line-height:1.45}
.controls{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:8px;
}
button{
  cursor:pointer;
}
.speak,.clear{
  border:0;
  border-radius:13px;
  padding:13px;
  font-size:16px;
  font-weight:900;
  color:white;
}

.clear{background:#dc2626}

  font-size:16px;
  font-weight:800;
}
.phraseBtn small{

  color:#64748b;
  font-weight:500;
  line-height:1.4;
}
.category{

  font-weight:900;
  color:#334155;
  margin:14px 0 6px;
}
.builderGrid{
  display:flex;
  flex-wrap:wrap;
  gap:8px;
}
.word{
  border:1px solid #cbd5e1;
  background:#fff;
  border-radius:12px;
  padding:11px 13px;
  font-size:15px;
  font-weight:800;
}
.menu{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:7px;
}
.menu button{
  border:0;
  border-radius:13px;
  padding:11px 5px;
  font-size:14px;
  font-weight:900;
  background:#e0e7ff;
  color:#1e3a8a;
}
.menu button.active{

  color:white;
}
.tip{
  background:#fff7ed;
  border:1px solid #fed7aa;
  color:#7c2d12;
  border-radius:15px;
  padding:12px;
  font-size:14px;
  line-height:1.6;
}
@media(max-width:560px){
  .dayTabs{grid-template-columns:repeat(2,1fr)}
  .menu{grid-template-columns:repeat(2,1fr)}

</header>

<main>

<section class="card">

</section>

</section>

<section class="card">

  </div>
  <div class="controls">
    <button class="speak" onclick="speakCurrent()">🔊 일본어 듣기</button>
    <button class="clear" onclick="clearAll()">🗑 지우기</button>
  </div>
</section>

<section class="card">
  <h2 id="phraseTitle">상황별 일본어</h2>
  <div class="menu" id="menu"></div>
  <div id="phraseList"></div>
</section>

<section class="tip">
  <b>사용법</b><br>
  1. 날짜를 누르면 그날 일정이 나옵니다.<br>
  2. 일정을 누르면 그 상황에 필요한 일본어만 자동으로 표시됩니다.<br>
  3. 문장을 누르면 일본어가 보이고 바로 음성으로 들립니다.<br>
  4. 카톡 안보다 크롬에서 열면 음성이 더 잘 나옵니다.
</section>

</main>

function autoSelectDay(){
  const now = new Date();
  const m = now.getMonth()+1;
  const d = now.getDate();
  if(m===8 && d===6) currentDay="0806";
  else if(m===8 && d===7) currentDay="0807";
  else if(m===8 && d===8) currentDay="0808";
  else if(m===8 && d===9) currentDay="0809";
}
autoSelectDay();

function renderDays(){
  const box=document.getElementById("dayTabs");
  box.innerHTML="";
  Object.keys(days).forEach(id=>{
    const b=document.createElement("button");
    b.textContent=days[id];
    b.className=id===currentDay?"active":"";
    b.onclick=()=>{
      currentDay=id;
      renderDays();
      renderSchedule();
    };
    box.appendChild(b);
  });
}

function renderSchedule(){
  document.getElementById("scheduleTitle").textContent = days[currentDay] + " 일정";
  const list=document.getElementById("scheduleList");
  list.innerHTML="";
  schedule[currentDay].forEach(item=>{
    const b=document.createElement("button");
    b.className="scheduleBtn";
    b.innerHTML=item[1] + "<small>" + item[0] + " · 누르면 관련 일본어 표시</small>";
    b.onclick=()=>{
      currentCategory=item[2];
      renderMenu();
      renderPhrases();
      window.scrollTo({top:document.getElementById("phraseTitle").offsetTop-80,behavior:"smooth"});
    };
    list.appendChild(b);
  });
}

function renderMenu(){
  const box=document.getElementById("menu");
  box.innerHTML="";
  Object.keys(categories).forEach(id=>{
    const b=document.createElement("button");
    b.textContent=categories[id];
    b.className=id===currentCategory?"active":"";
    b.onclick=()=>{
      currentCategory=id;
      renderMenu();
      renderPhrases();
    };
    box.appendChild(b);
  });
}

function renderPhrases(){
  const list=document.getElementById("phraseList");
  const title=document.getElementById("phraseTitle");
  list.innerHTML="";
  title.textContent = categories[currentCategory] + " 일본어";

  if(currentCategory==="builder"){
    builder.forEach(group=>{
      const t=document.createElement("div");
      t.className="category";
      t.textContent=group.title;
      list.appendChild(t);

      const grid=document.createElement("div");
      grid.className="builderGrid";
      group.words.forEach(w=>{
        const b=document.createElement("button");
        b.className="word";
        b.textContent=w[0];
        b.onclick=()=>addPart(w);
        grid.appendChild(b);
      });
      list.appendChild(grid);
    });
    return;
  }

  phrases[currentCategory].forEach(w=>{
    const b=document.createElement("button");
    b.className="phraseBtn";
    b.innerHTML=w[0]+"<small>"+w[1]+"<br>"+w[2]+"</small>";
    b.onclick=()=>{
      selected=w;
      show(w);
      speakText(w[1]);
    };
    list.appendChild(b);
  });
}

function show(w){
  document.getElementById("koResult").textContent=w[0];
  document.getElementById("jpResult").textContent=w[1];
  document.getElementById("pronResult").textContent=w[2];
}

function addPart(w){
  if(!selected) selected=["","",""];
  selected=[
    selected[0] ? selected[0]+" "+w[0] : w[0],
    selected[1] ? selected[1]+" "+w[1] : w[1],
    selected[2] ? selected[2]+" "+w[2] : w[2]
  ];
  show(selected);
}

function clearAll(){
  selected=null;
  document.getElementById("koResult").textContent="문장을 선택하세요";
  document.getElementById("jpResult").textContent="日本語がここに出ます";
  document.getElementById("pronResult").textContent="발음이 여기에 나옵니다";
}

function speakCurrent(){
  if(selected) speakText(selected[1]);
}

function speakText(text){
  speechSynthesis.cancel();
  const u=new SpeechSynthesisUtterance(text);
  u.lang="ja-JP";
  u.rate=0.82;
  u.pitch=1;
  const voices=speechSynthesis.getVoices();
  const v=voices.find(x=>x.lang==="ja-JP"||x.lang.startsWith("ja"));
  if(v) u.voice=v;
  speechSynthesis.speak(u);
}
speechSynthesis.onvoiceschanged=()=>speechSynthesis.getVoices();

renderDays();
renderSchedule();
renderMenu();
renderPhrases();
</script>

</body>
</html>
